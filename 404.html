<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — iStarTec</title>
  <meta name="description" content="A página que procura não existe. Volte à página inicial da iStarTec — instalações hidráulicas no Algarve." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://istartec.co/" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html,body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f7f8fa;
      color: #0f172a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
      line-height: 1.6;
    }
    .wrap {
      max-width: 540px;
      width: 100%;
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: #0f172a;
      text-decoration: none;
      margin-bottom: 2.5rem;
    }
    .logo__mark {
      width: 32px; height: 32px;
      background: #2563eb;
      border-radius: 8px;
      display: grid;
      place-items: center;
    }
    .star { color: #2563eb; }
    .code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(4rem, 14vw, 7rem);
      font-weight: 700;
      line-height: 1;
      color: #2563eb;
      letter-spacing: -.04em;
      margin: 0 0 .5rem;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      margin: 0 0 1rem;
      letter-spacing: -.02em;
    }
    p {
      color: #475569;
      margin: 0 0 2rem;
      font-size: 1.05rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .75rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: .85rem 1.5rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: .95rem;
      text-decoration: none;
      transition: transform .15s ease, background .15s ease;
    }
    .btn--primary {
      background: #2563eb;
      color: white;
    }
    .btn--primary:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn--ghost {
      background: white;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }
    .btn--ghost:hover { background: #f1f5f9; }
    .links {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #e2e8f0;
      font-size: .9rem;
      color: #64748b;
    }
    .links a {
      color: #2563eb;
      text-decoration: none;
      margin: 0 .5rem;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="logo">
      <span class="logo__mark">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M11 1 L13.5 8.5 L21 11 L13.5 13.5 L11 21 L8.5 13.5 L1 11 L8.5 8.5 Z" fill="white"/>
        </svg>
      </span>
      <span>i<span class="star">Star</span>Tec</span>
    </a>
    <p class="code">404</p>
    <h1>Página não encontrada</h1>
    <p>A página que procura não existe ou foi movida. Vamos voltar ao essencial.</p>
    <div class="actions">
      <a href="/" class="btn btn--primary">Ir para a página inicial</a>
      <a href="/contact/" class="btn btn--ghost">Pedir orçamento</a>
    </div>
    <div class="links">
      <a href="/services/">Serviços</a>·
      <a href="/portfolio/">Portfolio</a>·
      <a href="/about/">Sobre nós</a>·
      <a href="/contact/">Contacto</a>
    </div>
  </div>
</body>
</html>
